<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PhysiForm</title>

        <link rel="icon" type="image/png" href="X-Math.png">
    </head>
    <style>
       body {
            background-image: url(particle_accelerator.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }


        #NotesForm {
            margin: 50px;
            color: white;
            border-radius: 15px;
        }

        #SaveNotes {
            background-color: rgb(187, 202, 252);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #SaveNotes:hover {
            background-color: rgb(153, 173, 220);
        }

        #output {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            width: 50%;
            height: 75%;
            overflow-y: auto;
            margin: 50px;
        }
    </style>
    <body>
        <div id="output" style="float:right;">  </div>
        <form id="NotesForm">

            <h2> PhysiForm Notes</h2>
            <p> Feel free to put your thoughts, commentary, questions and notes here</p>
            <p> Remember to save work by using the "Save Notes" button at the bottom of the page! </p>
            <p> You may also resize this text area according to the length of you notes. </p>
            
            <label for="Notes"></label>
            <textarea id="Notes" placeholder="Enter Notes Here" name="Notes" required></textarea> <br><br>

            <button type="submit" id="SaveNotes"> Save Notes </button>
        </form>

        <script>
            // grab references once
            const notesTextarea = document.getElementById('Notes');
            const outputDiv = document.getElementById('output');
            const notesForm = document.getElementById('NotesForm');

            // when the form is submitted, show the notes and save them
            notesForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const notes = notesTextarea.value.trim();
                outputDiv.textContent = notes;             // display in output div
                localStorage.setItem('userNotes', notes);  // persist so it survives reload
            });

            // load from storage on page load and show immediately
            window.addEventListener('DOMContentLoaded', () => {
                const storedValue = localStorage.getItem('userNotes');
                if (storedValue !== null) {
                    outputDiv.textContent = storedValue;
                    // optionally also populate textarea so user can edit
                    notesTextarea.value = storedValue;
                }
            });
        </script>
    </body>
