<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PhysiForm</title>

        <link rel="icon" type="image/png" href="X-Math.png">
    </head>
    <style>
        body {
            background-image: url(physics-16372359.jpg);
            background-repeat: no-repeat;
            background-size: 100%;
            font-family: 'Courier New', Courier, monospace;
        }

        form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgb(187, 202, 252);
            padding: 50px;
            border-radius: 30px;
        }

        #UserName {
            margin-top: 10px;
        }

        #Password {
            margin-top: 10px;
        }
        
    </style>
    <body>
        <form id="LogIn">
            <h2> PhysiForm </h2>
            <h3>Log-in and Sign-up</h3>
            <fieldset>
                <label for="UserName"></label>
                <input type="text" id="UserName" placeholder="Enter Username" name="UserName" required>

                <br><br>

                <label for="Password"></label>
                <input type="password" id="Password" placeholder="Enter Password" name="Password"
                required> <br><br>
                
                <button type="submit" id="Submit"> Sign up </button>
                <button type="submit" id="loginButton"  > Log in </button>
            </fieldset>
        </form>

        <script>
            // Fix duplicate ID: Rename the button's ID to avoid conflict with the form
            // Add click event listeners to both buttons (since both are type="submit")
            document.getElementById("Submit").addEventListener("click", handleSubmit);
            document.getElementById("loginButton").addEventListener("click", handleSubmit);  // Renamed from "LogIn" to "loginButton"
            
            function handleSubmit(event) {
                event.preventDefault();  // Prevent default form submission (page reload)
                LoginData();  // Save username/password to localStorage
                window.location.href = 'homepage.html';  // Navigate to homepage.html (switches pages)
            }

            function LoginData() {
                const nameData = document.getElementById('UserName');
                const passData = document.getElementById('Password');

                let name = nameData.value;
                let pass = passData.value;

                localStorage.setItem('inputName', name);
                localStorage.setItem('inputPass', pass);
            }
        </script>
    </body>
</html>
